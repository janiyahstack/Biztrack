<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="product.css">
    <title>Products|Biztrack</title>
</head>
<body>
    <div class="search-container">
            <form id="searchForm">
                <input type="text" id="searchInput" placeholder="Search items...">
                <button type="submit"> 🔎</button>
            </form>
            <div id="productGrid" class="grid"></div>
                <div class="flex box"></div>
                <div class="modal" id="itemModal"> </div>
    <div class="modal-content">
        <a href="add.html" class="add-btn" onclick="showForm()">+</a>
  </div>
  <script>
const grid = document.getElementById("productGrid");

let products = JSON.parse(localStorage.getItem("products")) || [];

function renderProducts() {
  grid.innerHTML = "";

  products.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";

    if (p.image) {
      card.innerHTML += `<img src="${p.image}" style="width:100%;border-radius:8px">`;
    } else {
      card.innerHTML += `<div style="height:120px;background:#ddd;border-radius:8px"></div>`;
    }

    card.innerHTML += `
      <strong>${p.name}</strong><br>
      ₦${p.price}<br>
      Qty: ${p.qty}
    `;

    grid.appendChild(card);
  });
}

renderProducts();

const form = document.getElementById("productForm");

form.addEventListener("submit", e => {
  e.preventDefault();

  // collect data
  // push to products array
  // save to localStorage
});
</script>
</body>
</html>
